<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <title>PetsMap</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="pesquisa">
        <input onkeyup="filtrar()"  type="text" id="pesquisa" placeholder="Pesquisar petshops...">

        <ul id="listaprodutos" style="list-style-type: none; margin: 0; padding: 12px; width: 95%; align-items: center; display: contents;">
          
        </ul>
      

        <!--aqui vai ter o estilo da pesquisa-->
        <style>
            .pesquisa input {
                
                border-radius: 22px;
                border-color: black;
            }
            .pesquisa{
                text-align: center;
                top: 0;
                z-index: 1000;
            }
        </style>
        
        
        
    </div><br>


<!--aqui vai ser o text-->
  

  <style>
    body { font-family: Arial; text-align: center; }
    input { width: 300px; padding: 10px; }
    button { padding: 10px; cursor: pointer; }
    #resultados { margin-top: 20px; }
    .item { border-bottom: 1px solid #ccc; padding: 10px; }
  </style>




<script src="pets.com.js">

    fetch('https://fakestoreapi.com/products?limit=4')
  .then(response => response.json())
  .then((data) => {
    console.log(data);
    const ul = document.getElementById('listaprodutos');
    data.forEach((item) => {
      const li = document.createElement('li');
      li.innerHTML = ` <a href="#" style="text-decoration: none; color: black;">
              <img src="${item.image}" alt="2" width="50" height="50">
              <span>${item.title}</span>
            </a>`;
      ul.appendChild(li);
    });
  });

</script>

</html>
