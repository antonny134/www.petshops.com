<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="pesquisa" id="name">
        <label for="p"><span><i class="bi bi-search"></i></span></label>
        <input type="text" placeholder="Pesquisar...">

        <!--aqui vai ter o estilo da pesquisa-->
        <style>
            .pesquisa input {
                
                border-radius: 22px;
                border-color: black;
            }
            .pesquisa{
                text-align: center;
                top: 0;
                z-index: 1000;
            }
        </style>
        
        
        
    </div><br>


       <!--aqui vai ter os mapas -->

       

  <h2>Escolha seu estado:</h2>

  <select id="estado" onchange="irParaLink()">
    <option value="">Selecione...</option>
    <option value="https://maps.app.goo.gl/Qcnmu4HTiWtRYM7C8">Maranhão</option>
    <option value="https://exemplo.com/sp">São Paulo</option>
    <option value="https://exemplo.com/rj">Rio de Janeiro</option>
    <option value="https://exemplo.com/mg">Minas Gerais</option>
  </select>

  <script>
    function irParaLink() {
      var select = document.getElementById("estado");
      var link = select.value;

      if (link !== "") {
        window.location.href = link;
      }
    }
  </script>


    
   <script src="pets.com.js">

        document.getElementById('name').addEventListener('keyup', function(e) {
    const term = e.target.value.toLowerCase(); // Captura e converte p/ minúsculas
    const items = document.getElementsByClassName('item');
    
    Array.from(items).forEach(function(item) {
        const itemName = item.textContent.toLowerCase();
        // Verifica se o item contém o texto pesquisado
        if (itemName.indexOf(term) != -1) {
            item.style.display = 'block'; // Mostra
        } else {
            item.style.display = 'none'; // Oculta
        }
    });
});
   </script>
</body>
</html>
