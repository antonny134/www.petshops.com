<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <title>PetsMap</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
  <style>
    body{
      margin: 0;
      padding: 0;
     
    }
      .buscar{
        display: flex;
        justify-content: center;
        margin-top: 0px;
        position: relative;
      }
    .pesquisa ul{
      list-style-type: none;
      padding: 0px;
      margin: 0px;
      width: 90%;
      margin-left: calc(5%);
      margin-top: 0px;
      display: none;
       position: absolute;
    }

    .pesquisa ul a:hover{
      background-color: #eee;
    }
  </style>
<body>
   
    <div class="buscar">
       <input  id="myinput" onkeyup="filtrar()"  type="text" id="pesquisa" placeholder="Pesquisar petshops...">
    </div>

    <div class="pesquisa">
       

        <ul id="listaprodutos">
          
        </ul>
      <div class="subtitulo">
        <p>nome</p>
    </div>

        <!--aqui vai ter o estilo da pesquisa-->
        <style>
            .buscar input{
                margin-top: 10px;
                border-radius: 22px;
                border-color: black;
                
            }
            .pesquisa li a{
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: 1px solid #ccc;
                background: #f6f6f6;
                margin: 3px ;
                padding: 0px;
                list-style-type: none;
             
                
            }
        </style>
        
        
        
    </div><br>


<!--aqui vai ser o text-->
  

  <style>
    body { font-family: Arial; text-align: center; }
    input { width: 300px; padding: 10px; }
    button { padding: 10px; cursor: pointer; }
    #resultados { margin-top: 20px; }
    .item { border-bottom: 1px solid #ccc; padding: 10px; }
  </style>




<script src="pets.com.js">

   fetch('https://fakestoreapi.com/products')
  .then(response => response.json())
  .then((data) => {
    console.log(data);
    const ul = document.getElementById('listaprodutos');
    data.forEach((item) => {
      const li = document.createElement('li');
      li.innerHTML = ` <a href="#" style="text-decoration: none; color: black;">
              <img src="${item.image}" alt="2" width="50" >
              <span>${item.title}</span>
            </a>`;
      ul.appendChild(li);
    });
  });

  function filtrar() {
    var input, filter, ul, li, a, i, txtValue, count = 0;

    input = document.getElementById('myinput');
    ul = document.getElementById('listaprodutos');

    //filtrar o valor do input
    filter = input.value.toUpperCase();

    //pegar os itens da lista (li)
    li = ul.getElementsByTagName('li');
    //loop para comparar o valor do input com os itens da lista
    for (i = 0; i < li.length; i++) {
      a = li[i].getElementsByTagName('a')[0];
      txtValue = a.textContent || a.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        li[i].style.display = '';
        count++;
      } else {
        li[i].style.display = 'none';
      }
      count++;
    }

    if (count === 0) {
      ul.style.display = 'none';
    } else {
      ul.style.display = 'block';
    }
  }

</script>

</html>
